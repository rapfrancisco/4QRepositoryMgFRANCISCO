<!DOCTYPE html>
<html>
<head>
    <title>Movie Add-ons</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../style.css">
    <script src="../script.js"></script>
</head>
<body>
    <h1>Add a Movie</h1>
    <form id="lemovieform">
        <label for="letitle">Title:</label><br>
        <input type="text" id="ttl" name="title" value=""><br>
        <label for="leyear">Year:</label><br>
        <input type="number" id="year"><br>
        <label for="legenre">Genre:</label>
        <select id="genie" name="genre">
            <option value="hr">Horror</option>
            <option value="si">Sci-fi</option>
            <option value="an">Animation</option>
            <option value="ml">Musical</option>
            <option value="cd">Comedy</option>
            <option value="my">Mystery</option>
            <option value="an">Action</option>
            <option value="re">Romance</option>
        </select>

        <h2>Rating:</h2>
        <div id="srats">
        <span class="star" data-value="100">★</span>
        <span class="star" data-value="200">★</span>
        <span class="star" data-value="300">★</span>
        <span class="star" data-value="400">★</span>
        <span class="star" data-value="500">★</span>
        </div>
        <button type="button" onclick="addmovie()"> Add Movie </button>
        
        <h1>List of Movies</h1>
        <div id="listofmovies"></div>
    </form> 
</body>
</html>
