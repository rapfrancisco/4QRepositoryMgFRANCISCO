<!DOCTYPE html>
<html>
<head>
    <title>Movie Add-ons</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <h1>Add a Movie</h1>
    <form id="lemovieform">
        <label for="letitle">Title:</label><br>
        <input type="text" id="ttl" name="title" value="" required><br>
        <label for="leyear">Year:</label><br>
        <input type="number" id="year" required><br>
        <label for="legenre">Genre:</label>
        <select id="genie" name="genre">
            <option value="Horror">Horror</option>
            <option value="Sci-fi">Sci-fi</option>
            <option value="Animation">Animation</option>
            <option value="Musical">Musical</option>
            <option value="Comedy">Comedy</option>
            <option value="Mystery">Mystery</option>
            <option value="Action">Action</option>
            <option value="Romance">Romance</option>
        </select>

        <h2>Rating:</h2>
        <div id="srats">
        <span class="star" data-value="1">★</span>
        <span class="star" data-value="2">★</span>
        <span class="star" data-value="3">★</span>
        <span class="star" data-value="4">★</span>
        <span class="star" data-value="5">★</span>
        </div>
        <button type="button" onclick="addmovie()"> Add Movie </button>
        
        <h1>List of Movies</h1>
        <div id="listofmovies"></div>
    </form> 
    <script src="../script.js"></script>
</body>
</html>
